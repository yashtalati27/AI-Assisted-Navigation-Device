services:
  jaeger:
    image: jaegertracing/all-in-one:1.58
    container_name: jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686" # Jaeger UI
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: walkbuddy-backend
    ports:
      - "8000:8000"
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - WALKBUDDY_MODEL_DIR=/models
      - WALKBUDDY_API_KEY=${WALKBUDDY_API_KEY}
    volumes:
      - ../../../ML_side/models:/models
    depends_on:
      - jaeger
